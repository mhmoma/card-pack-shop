<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, interactive-widget=resizes-content, user-scalable=no">
  <title>卡包商店</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="packs.css">
  <link rel="stylesheet" href="start.css">
</head>
<body>
  <div id="app" class="game-shell locked">
    <section id="coverScreen" class="cover-screen">
      <div class="cover-panel">
        <img id="coverArt" class="cover-art" src="./assets/generated/cover-monster-card-shop.d668afa3.webp" alt="卡包商店封面">
        <div class="cover-menu">
          <h1>卡包商店</h1>
          <p>选择卡槽，云端存档冷启动后进入商店。</p>
          <div id="saveSlots" class="save-slots"></div>
        </div>
      </div>
    </section>
    <section id="loadingScreen" class="loading-screen hidden">
      <div class="loading-box">
        <h2>加载中</h2>
        <p id="loadingText">准备中...</p>
        <div class="progress-shell"><img src="./assets/generated/progress-gem-bar.260f2b42.webp" alt=""><span id="loadingFill"></span></div>
      </div>
    </section>
    <header class="top-bar">
      <div>
        <h1>卡包商店</h1>
        <p>购买卡包，收集来自 PokeAPI 的宝可梦卡片</p>
      </div>
      <div class="wallet">
        <strong id="gold">0</strong>
        <span>金币</span>
        <button id="saveMenuBtn">存档</button>
      </div>
    </header>

    <main class="content">
      <section id="shopView" class="shop-scene">
        <div id="refreshText" class="scene-timer">刷新中...</div>
        <div id="shopGrid" class="shelf-grid"></div>
        <div id="buyPopup" class="buy-popup hidden">
          <button id="closeBuyPopup" class="popup-close">×</button>
          <div id="buyPopupName" class="popup-name">卡包</div>
          <div id="buyPopupPrice" class="popup-price">0 金币</div>
          <button id="confirmBuyBtn" class="popup-buy">购买</button>
        </div>
      </section>

      <section id="packsView" class="panel hidden">
        <div class="section-head">
          <h2>未开卡包</h2>
          <p>打开卡包获得随机宝可梦卡片，也可卖给市场。</p>
        </div>
        <div id="packsList" class="pack-inventory"></div>
        <div id="packPopup" class="pack-popup hidden">
          <button id="closePackPopup" class="popup-close">×</button>
          <div id="packPopupName" class="popup-name">卡包</div>
          <div id="packPopupInfo" class="popup-price">0 金币</div>
          <div class="row"><button id="openSelectedPack">开启</button><button id="sellSelectedPack">出售</button></div>
        </div>
      </section>

      <section id="collectionView" class="panel hidden">
        <div class="section-head">
          <h2>收藏图鉴</h2>
          <p id="collectionInfo">暂无卡片</p>
        </div>
        <div id="collectionFilters" class="collection-filters"></div>
        <div id="cardsGrid" class="cards-grid"></div>
        <button id="loadMoreCards" class="load-more hidden">加载更多</button>
      </section>

      <section id="marketView" class="panel hidden">
        <div class="section-head">
          <h2>模拟市场</h2>
          <p id="marketText">市场行情会随商店刷新波动。</p>
        </div>
        <div id="marketList" class="list-grid"></div>
        <div class="section-head trade-head"><h2>玩家交易所</h2><p>短暗号上架，云端成交，卖家上线自动收款。</p></div>
        <div id="tradeList" class="list-grid"></div>
        <button id="loadMoreTrade" class="load-more hidden">加载更多交易</button>
      </section>
    </main>

    <nav class="bottom-nav">
      <button data-tab="shop" class="active">商店</button>
      <button data-tab="packs">卡包</button>
      <button data-tab="collection">收藏</button>
      <button data-tab="market">市场</button>
    </nav>

    <div id="modal" class="modal hidden">
      <div class="modal-card">
        <button id="closeModal" class="close-btn">×</button>
        <h2 id="modalTitle">开包结果</h2>
        <div id="modalBody" class="cards-grid compact"></div>
      </div>
    </div>
  </div>

  <script src="storage.js"></script>
  <script src="config.js"></script>
  <script src="pokemon-data.js"></script>
  <script src="poke-api.js"></script>
  <script src="collection.js"></script>
  <script src="formulas.js"></script>
  <script src="save-system.js"></script>
  <script src="trade-market.js"></script>
  <script src="ui.js"></script>
  <script src="trade-actions.js"></script>
  <script src="game.js"></script>
</body>
</html>
